{% extends 'base.html' %}
{% block content %}
<h1>Articles</h1>
<a href="{% url 'articles:new' %}">NEW</a>
<hr>
{% for article in articles %}
  <div>
    <p>글 번호: {{ article.pk }}</p>
    <p>글 제목: <a href="{% url "articles:detail" article.pk %}">{{ article.title }}</a></p>
    <p>글 내용: {{ article.content }}</p>
  </div>
  <hr>
{% endfor %}
{% endblock content %}
